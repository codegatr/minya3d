<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#8B5CF6" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Arkaplan -->
  <rect width="400" height="400" fill="#0A1628"/>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- İçerik -->
  
  <!-- Sol küpe -->
  <polygon points="155,130 185,130 170,185" fill="#8B5CF6" opacity="0.7" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="170" cy="120" r="10" fill="#0D1F35" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="170" y1="105" x2="170" y2="95" stroke="#475569" stroke-width="2"/>
  <!-- Sağ küpe -->
  <polygon points="215,130 245,130 230,185" fill="#8B5CF6" opacity="0.7" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="230" cy="120" r="10" fill="#0D1F35" stroke="#8B5CF6" stroke-width="1.5"/>
  <line x1="230" y1="105" x2="230" y2="95" stroke="#475569" stroke-width="2"/>
  <!-- Bilezik -->
  <ellipse cx="200" cy="270" rx="65" ry="35" fill="none" stroke="#8B5CF6" stroke-width="4" opacity="0.6"/>
  <polygon points="185,255 200,240 215,255 215,285 200,300 185,285" fill="#0D1F35" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="200" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94A3B8">Takı & Küpe</text>

  <!-- Etiket -->
  <rect x="0" y="356" width="400" height="44" fill="#0D1F35" opacity="0.95"/>
  <line x1="0" y1="356" x2="400" y2="356" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <text x="200" y="382" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B5CF6" opacity="0.9">TAKI & AKSESUAR</text>
