<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0EA5E9" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Arkaplan -->
  <rect width="400" height="400" fill="#0A1628"/>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- İçerik -->
  
  <!-- Kutu -->
  <rect x="110" y="120" width="180" height="160" rx="10" fill="#0D1F35" stroke="#0EA5E9" stroke-width="1.5"/>
  <!-- PCB -->
  <rect x="125" y="135" width="150" height="120" rx="4" fill="#0f3460" stroke="#0EA5E9" stroke-width="0.5" opacity="0.8"/>
  <!-- Port delikler -->
  <rect x="105" y="150" width="10" height="20" rx="2" fill="#0A1628" stroke="#0EA5E9" stroke-width="1"/>
  <rect x="105" y="178" width="10" height="14" rx="2" fill="#0A1628" stroke="#0EA5E9" stroke-width="1"/>
  <rect x="285" y="148" width="10" height="16" rx="2" fill="#0A1628" stroke="#0EA5E9" stroke-width="1"/>
  <rect x="285" y="170" width="10" height="16" rx="2" fill="#0A1628" stroke="#0EA5E9" stroke-width="1"/>
  <!-- Chipset -->
  <rect x="160" y="165" width="50" height="50" rx="3" fill="#0EA5E9" opacity="0.3"/>
  <rect x="165" y="170" width="40" height="40" rx="2" fill="#0EA5E9" opacity="0.2"/>
  <text x="185" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="#0EA5E9" opacity="0.8">RPi</text>
  <!-- LED -->
  <circle cx="255" cy="150" r="5" fill="#22C55E" opacity="0.9"/>
  <circle cx="245" cy="150" r="5" fill="#F97316" opacity="0.7"/>
  <text x="200" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94A3B8">Pi Kutusu</text>

  <!-- Etiket -->
  <rect x="0" y="356" width="400" height="44" fill="#0D1F35" opacity="0.95"/>
  <line x1="0" y1="356" x2="400" y2="356" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
  <text x="200" y="382" text-anchor="middle" font-family="monospace" font-size="12" fill="#0EA5E9" opacity="0.9">TEKNOLOJİ</text>
</svg>